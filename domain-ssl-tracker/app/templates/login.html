<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — Domain & SSL Tracker</title>
    <link rel="stylesheet" href="/static/style.css" />
</head>
<body class="login-body">

<div class="login-wrap">
    <div class="login-box">
        <div class="login-logo">🔐</div>
        <h1 class="login-title">Domain &amp; SSL Tracker</h1>
        <p class="login-sub">Sign in to manage domains and settings</p>

        {% if error %}
        <div class="alert alert-error" style="margin-bottom:1rem;">{{ error }}</div>
        {% endif %}

        <form method="post" action="/login" class="login-form">
            <input type="hidden" name="next" value="{{ next }}" />

            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="admin" required autofocus autocomplete="username" />
            </div>

            <div class="form-group" style="margin-top:0.75rem;">
                <label>Password</label>
                <input type="password" name="password" placeholder="••••••••" required autocomplete="current-password" />
            </div>

            <button type="submit" class="btn btn-primary login-btn">Sign In →</button>
        </form>
    </div>
</div>

</body>
</html>
